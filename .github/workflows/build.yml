name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: |
        brew install xcodegen

    - name: Generate Xcode Project
      run: |
        xcodegen generate

    - name: Build App (Unsigned)
      run: |
        xcodebuild build \
          -project InstrumentosApp.xcodeproj \
          -scheme InstrumentosApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_STYLE=Manual

    - name: Create Unsigned IPA Package
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/InstrumentosApp.app Payload/
        zip -r InstrumentosApp.ipa Payload/
        echo "IPA successfully created at InstrumentosApp.ipa"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InstrumentosApp-Unsigned-IPA
        path: InstrumentosApp.ipa
        if-no-files-found: error
        retention-days: 7
